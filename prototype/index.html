<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shift View — Operators & Teams Prototype</title>
  <link href="https://cdn.jsdelivr.net/npm/vuetify@3/dist/vuetify.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7/css/materialdesignicons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="evocon-ui.css" />
  <style>
    /* In Shift View the 1st-level sidebar sits beside the dark shift area — no top bar */
    .sv-with-sidebar { display: flex; width: 100vw; height: 100vh; overflow: hidden; }
    .sv-with-sidebar .sb1 { position: static; height: 100vh; flex-shrink: 0; }
    .sv-with-sidebar #app { flex: 1; min-width: 0; }
  </style>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: 'Open Sans', sans-serif; }

    /* ════════════════════════════════════
       LAYOUT
       ════════════════════════════════════ */
    .app-layout {
      display: flex;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    .shift-view-section {
      flex: 1 1 0;
      min-width: 0;
      overflow: hidden;
    }

    /* ════════════════════════════════════
       SHIFT VIEW — dark theme
       ════════════════════════════════════ */
    .sv-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: #121212;
      font-family: 'Open Sans', sans-serif;
      color: #e0e0e0;
    }

    /* ── 3-Column Grid ── */
    .sv-main-grid {
      display: flex;
      padding: 8px;
      gap: 8px;
      background: #121212;
      flex-shrink: 0;
    }

    /* Shared block style */
    .sv-topbar-block {
      background: #000;
      border-radius: 4px;
      height: 48px;
      display: flex;
      align-items: center;
      padding: 4px;
    }

    /* Logo */
    .sv-logo-btn {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      background: rgba(46, 204, 113, 0.12);
      cursor: pointer;
      flex-shrink: 0;
      padding: 4px;
    }
    .sv-logo-btn:hover { background: rgba(46, 204, 113, 0.2); }
    .sv-logo-btn img {
      height: 36px;
      width: auto;
      object-fit: contain;
    }

    /* Column 1 */
    .sv-col-1 {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 588px;
      flex-shrink: 0;
    }
    .sv-col1-header {
      display: flex;
      gap: 8px;
      height: 48px;
    }

    /* Column 2 */
    .sv-col-2 {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }
    .sv-col2-header {
      display: flex;
      gap: 8px;
      height: 48px;
      overflow: visible;
    }

    /* Column 3 */
    .sv-col-3 {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 270px;
      flex-shrink: 0;
    }
    .sv-col3-header {
      display: flex;
      gap: 8px;
      height: 48px;
      overflow: visible;
    }

    /* Station & shift picker blocks */
    .sv-station-block { flex: 1; min-width: 0; }
    .sv-shift-block  { flex: 1; min-width: 0; }

    .sv-nav-arrows {
      display: flex;
      align-items: center;
      padding-right: 8px;
      flex-shrink: 0;
    }
    .sv-nav-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      border-radius: 24px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .sv-nav-btn:hover { background: rgba(255,255,255,0.08); }
    .sv-nav-btn[disabled] { opacity: 0.25; cursor: default; }
    .sv-nav-btn[disabled]:hover { background: transparent; }
    .sv-nav-btn.dimmed { opacity: 0.25; }
    .sv-nav-btn.dimmed:hover { background: transparent; }

    .sv-block-label {
      font-family: 'Open Sans', sans-serif;
      font-size: 20px;
      font-weight: 600;
      line-height: 25.92px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .sv-live-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #2ecc71;
      flex-shrink: 0;
      margin-left: 12px;
      margin-right: 8px;
    }

    /* Time block */
    .sv-time-block {
      flex: 1;
      min-width: 0;
      justify-content: center;
      gap: 2px;
      padding: 4px 12px;
    }
    .sv-clock-hm {
      font-family: 'Open Sans', sans-serif;
      font-size: 20px;
      font-weight: 600;
      line-height: 25.92px;
      color: #fff;
    }
    .sv-clock-sec {
      font-family: 'Open Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
      color: #9e9e9e;
      align-self: flex-start;
      margin-top: 6px;
    }

    /* Settings block */
    .sv-settings-block {
      width: 48px;
      flex-shrink: 0;
      justify-content: center;
    }
    .sv-icon-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      border-radius: 24px;
      cursor: pointer;
    }
    .sv-icon-btn:hover { background: rgba(255,255,255,0.08); }

    .sv-shift-batch-row {
      display: flex;
      gap: 8px;
      height: 116px;
    }
    .sv-info-panel {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      min-width: 0;
    }
    .sv-quantity-box, .sv-batch-box {
      background: #000;
      border-radius: 4px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sv-quantity-box { width: 240px; flex-shrink: 0; }
    .sv-batch-box { flex: 1; min-width: 0; }
    .sv-qty-label, .sv-batch-label {
      font-size: 10px;
      font-weight: 600;
      color: #ccc;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      line-height: 16px;
      text-align: center;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sv-batch-label { text-align: center; }
    .sv-qty-value {
      font-size: 34px;
      font-weight: 400;
      color: #fff;
      line-height: 40px;
      letter-spacing: 0.12px;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sv-qty-target {
      font-size: 16px;
      font-weight: 400;
      color: #ccc;
      line-height: 24px;
    }
    .sv-qty-target-info {
      display: inline-flex;
      align-items: center;
      padding: 6px;
      border-radius: 24px;
      vertical-align: middle;
    }
    .sv-batch-row {
      font-size: 14px;
      font-weight: 400;
      color: #fff;
      line-height: 20px;
    }
    .sv-batch-dim { color: #ccc; font-weight: 600; font-size: 10px; letter-spacing: 0.8px; text-transform: uppercase; line-height: 16px; }
    .sv-batch-progress {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .sv-batch-nums {
      font-size: 14px;
      color: #fff;
      white-space: nowrap;
      line-height: 20px;
    }
    .sv-batch-nums .green { color: #2ecc71; }
    .sv-batch-nums .orange { color: #f28a0d; }
    .sv-batch-bar {
      flex: 1;
      height: 6px;
      background: #303030;
      border-radius: 8px;
      overflow: hidden;
    }
    .sv-batch-bar-fill {
      height: 100%;
      background: #2ecc71;
      border-radius: 8px;
    }
    .sv-batch-eta {
      font-size: 14px;
      color: #fff;
      line-height: 20px;
    }

    /* Upcoming batches */
    .sv-upcoming-box {
      background: #000;
      border-radius: 4px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }
    .sv-upcoming-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 10px;
      font-weight: 600;
      color: #ccc;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      line-height: 16px;
    }
    .sv-upcoming-header button {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; border-radius: 24px; cursor: pointer;
    }
    .sv-upcoming-header button:hover { background: rgba(255,255,255,0.08); }
    .sv-upcoming-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      color: #fff;
      line-height: 20px;
    }

    /* Graph panel */
    .sv-graph-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
    }
    .sv-graph-tabs-row {
      display: flex;
      align-items: center;
      padding: 4px;
      height: 48px;
      flex-shrink: 0;
    }
    .sv-graph-tabs {
      display: flex;
      gap: 0;
      flex: 1;
    }
    .sv-graph-tab {
      font-size: 14px;
      font-weight: 400;
      color: #9e9e9e;
      cursor: pointer;
      padding: 4px 16px;
      line-height: 20px;
      white-space: nowrap;
    }
    .sv-graph-tab.active { color: #fff; }
    .sv-graph-area {
      flex: 1;
      display: flex;
      gap: 4px;
      padding: 8px;
      overflow: hidden;
    }
    .sv-graph-y {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-size: 10px;
      color: #616161;
      padding-right: 4px;
      flex-shrink: 0;
      width: 24px;
    }
    .sv-graph-bars {
      flex: 1;
      display: flex;
      align-items: flex-end;
      gap: 2px;
    }

    /* OEE panel */
    .sv-oee-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .sv-oee-content {
      flex: 1;
      background: #000;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 8px;
    }
    .sv-oee-label {
      font-size: 10px;
      font-weight: 600;
      color: #ccc;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      line-height: 16px;
      text-align: center;
      width: 100%;
    }
    .sv-oee-body {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex: 1;
      min-height: 0;
      width: 100%;
    }
    .sv-oee-mascot {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sv-oee-mascot img {
      max-height: 170px;
      max-width: 100%;
      object-fit: contain;
    }
    .sv-oee-metrics {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .sv-oee-pct {
      font-size: 34px;
      font-weight: 400;
      color: #2ecc71;
      line-height: 40px;
      letter-spacing: 0.12px;
      text-align: center;
    }
    .sv-oee-apq {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 14px;
      font-weight: 600;
      line-height: 20px;
    }
    .sv-oee-apq-row {
      display: flex;
      gap: 4px;
    }
    .sv-oee-apq-row.a-row { color: #2ecc71; }
    .sv-oee-apq-row.p-row { color: #fdf502; }
    .sv-oee-apq-row.q-row { color: #f28a0d; }

    /* ── Timeline ── */
    .sv-timeline-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .sv-minutes-header {
      display: flex;
      height: 24px;
      flex-shrink: 0;
      font-size: 12px;
      color: #616161;
    }
    .sv-minutes-track {
      flex: 1;
      position: relative;
    }
    .sv-min-mark {
      position: absolute;
      top: 0;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 400;
      color: #616161;
      line-height: 24px;
    }
    .sv-hour-col {
      width: 60px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 400;
      color: #9e9e9e;
    }
    .sv-prod-col {
      width: 140px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 20px;
      font-size: 14px;
      font-weight: 400;
      color: #ccc;
      line-height: 20px;
      white-space: nowrap;
    }
    .sv-prod-col .prod-actual { font-weight: 600; }
    .sv-prod-col.green .prod-actual { color: #4caf50; }
    .sv-prod-col.red .prod-actual { color: #f44336; }

    .sv-timeline-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .sv-timeline-row {
      display: flex;
      height: 68.25px;
    }
    .sv-segments-col {
      flex: 1;
      display: flex;
      align-items: stretch;
      gap: 0;
      padding: 4px 0;
    }
    .sv-segment {
      height: 100%;
      border-radius: 2px;
    }

    .sv-timeline-grid {
      position: absolute;
      top: 0;
      left: 60px;
      right: 140px;
      bottom: 0;
      pointer-events: none;
    }
    .sv-grid-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 0;
      border-left: 1px dashed rgba(255,255,255,0.12);
    }

    /* ── Bottom bar ── */
    .sv-bottombar {
      height: 48px;
      display: flex;
      align-items: center;
      background: #101010;
      flex-shrink: 0;
      border-top: 0.25px solid rgba(255,255,255,0.25);
    }
    .sv-bottombar-icon {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
    }
    .sv-legend-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex: 1;
      height: 48px;
      font-size: 14px;
      font-weight: 400;
      color: #fff;
      line-height: 20px;
      cursor: pointer;
      min-width: 0;
    }
    .sv-legend-item:hover { background: rgba(255,255,255,0.04); }
    .sv-counter {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 4px 6px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 400;
      line-height: 10px;
      letter-spacing: 0.06px;
    }
    .sv-counter.red { background: #e01c21; color: #fff; }
    .sv-counter.yellow { background: #fdf502; color: #212121; }
    .sv-counter.green {
      background: rgba(46, 204, 113, 0.12);
      border: 1px solid #2ecc71;
      color: #fff;
    }
    /* Operator chip text matches the rest of the legend (font-weight 400,
       14px, 20px line-height — inherited from .sv-legend-item). */
    .sv-leader-name { font-weight: 400; }
    /* Tight inline group inside the operator chip so the team-name and "+N"
       sit as one flowing line rather than being spaced by the legend gap. */
    .sv-op-summary {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .sv-team-swatch {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ════════════════════════════════════
       OPERATORS PANEL — pixel-perfect from Figma
       ════════════════════════════════════ */
    .op-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .op-modal {
      background: white;
      border-radius: 4px;
      width: 700px;;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow:
        0px 1px 5px 0px rgba(0,0,0,0.25),
        0px 2px 2px 0px rgba(0,0,0,0.12),
        0px 3px 1px -2px rgba(0,0,0,0.12);
      overflow: hidden;
    }
    .op-modal-tall { height: 900px; }

    /* Header */
    .op-header {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-shrink: 0;
      background: white;
    }
    .op-header-title {
      font-family: 'Open Sans', sans-serif;
      font-size: 20px;
      font-weight: 600;
      line-height: 25.92px;
      color: #212121;
    }

    /* Body */
    .op-body {
      flex: 1;
      padding: 8px 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .op-body-scroll {
      padding: 16px 16px 0;
      gap: 16px;
    }
    .op-empty {
      color: #9e9e9e;
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      line-height: 20px;
      text-align: center;
      padding: 32px 0;
    }

    /* Footer */
    .op-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px 16px;
      flex-shrink: 0;
    }
    .op-footer-left {
      display: flex;
      gap: 8px;
      align-items: center;
      min-height: 36px;
    }
    .op-footer-right-only {
      justify-content: flex-end;
      gap: 8px;
    }

    /* Buttons */
    .op-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      line-height: 16px;
      text-transform: uppercase;
      border: none;
      background: none;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .op-btn-outline {
      background: #eee;
      color: #212121;
    }
    .op-btn-outline:hover { background: #e0e0e0; }
    .op-btn-green {
      color: #2ecc71;
      background: rgba(46, 204, 113, 0.12);
    }
    .op-btn-green:hover { background: rgba(46, 204, 113, 0.2); }
    .op-btn-text {
      color: #212121;
      padding: 6px 16px 6px 16px;
    }
    .op-btn-text:hover { background: rgba(0,0,0,0.04); }
    .op-btn-save {
      background: #2ecc71;
      color: #fff;
    }
    .op-btn-save:hover { background: #27ae60; }
    .op-btn-save:disabled {
      background: rgba(0,0,0,0.12);
      color: rgba(0,0,0,0.38);
      cursor: default;
    }
    .op-btn-save:disabled:hover { background: rgba(0,0,0,0.12); }

    /* Cards (overview) */
    .op-card {
      background: white;
      border-radius: 4px;
      padding: 8px 16px;
      min-height: 62px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      box-shadow:
        0px 1px 5px 0px rgba(0,0,0,0.25),
        0px 2px 2px 0px rgba(0,0,0,0.12),
        0px 3px 1px -2px rgba(0,0,0,0.12);
      overflow: visible;
    }
    .op-card-top {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .op-card-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
    }
    .op-card-names {
      font-family: 'Open Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      line-height: 24px;
      color: #212121;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .op-tooltip {
      position: fixed;
      background: #212121;
      color: #fff;
      font-family: 'Open Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      line-height: 18px;
      padding: 8px 12px;
      border-radius: 8px;
      white-space: normal;
      max-width: 320px;
      z-index: 9999;
      pointer-events: none;
    }
    .op-card-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'Open Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
      color: #212121;
      background: #eee;
      border-radius: 24px;
      padding: 5px 12px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .op-card-icons {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .op-icon-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      border-radius: 24px;
      cursor: pointer;
      padding: 8px;
    }
    .op-icon-btn:hover { background: rgba(0,0,0,0.04); }
    .op-card-bottom {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      font-family: 'Open Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
      color: #212121;
    }

    /* Search (add-operators) */
    .op-search {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 56px;
      padding: 0 12px;
      background: #f5f5f5;
      border-bottom: 1px solid #707070;
      border-radius: 4px 4px 0 0;
    }
    .op-search-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'Open Sans', sans-serif;
      font-size: 16px;
      line-height: 24px;
      color: #212121;
      outline: none;
    }
    .op-search-input::placeholder { color: #9e9e9e; }

    /* Team list & checkboxes */
    .op-team-list {
      flex: 1;
      overflow-x: hidden;
      overflow-y: auto;
    }
    .op-team-group {}
    .op-check-row {
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    .op-check-row-inner {
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      flex: 1;
      min-width: 0;
    }
    .op-team-row {
      height: 48px;
      padding: 0 16px;
      gap: 16px;
    }
    /* Tighten group name → color swatch gap to 8px (overrides the row gap). */
    .op-team-row .op-team-swatch + .op-team-label { margin-left: -8px; }
    .op-op-row {
      height: 40px;
      padding: 0 16px 0 32px;
      gap: 8px;
    }
    /* No-team operator rows: no parent team group, so align the checkbox
       with the team-row level (16px) rather than the indented operator level. */
    .op-op-row-flush { padding-left: 16px; }
    .op-check-box {
      width: 24px;
      height: 24px;
      border: 2px solid #9e9e9e;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: all 0.15s;
    }
    .op-check-box.checked {
      background: #2ecc71;
      border-color: #2ecc71;
    }
    .op-check-box.partial {
      background: #2ecc71;
      border-color: #2ecc71;
    }
    .op-team-label {
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
      color: #212121;
      margin-right: 0px;
    }
    .op-team-swatch {
      display: inline-block;
      width: 16px;
      height: 16px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-left: 0px;
    }
    .op-card-team-swatch {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .op-team-row-noteam .op-team-label {
      color: #757575;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .op-op-name {
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
      color: #212121;
    }

    /* Tag chips */
    .op-tag-area {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 4px 0;
      flex-shrink: 0;
    }
    .op-tag-chip-readonly {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
      color: #212121;
      background: rgba(46, 204, 113, 0.12);
      border: 1px solid #2ecc71;
      border-radius: 24px;
      height: 32px;
      padding: 0 12px;
      white-space: nowrap;
    }
    .op-tag-chip-editable { cursor: pointer; }
    .op-tag-chip-editable:hover { background: rgba(46, 204, 113, 0.2); }

    /* "No tag selected" CTA — solid grey filter-chip per Figma 32002:25201 */
    .op-tag-chip-ghost {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
      color: #212121;
      background: #eee;
      border: none;
      border-radius: 24px;
      height: 32px;
      padding: 0 12px;
      white-space: nowrap;
      cursor: pointer;
    }
    .op-tag-chip-ghost:hover { background: #e0e0e0; }

    .op-tag-dropdown {
      position: fixed;
      background: #fff;
      border-radius: 4px;
      box-shadow: 0px 2px 8px rgba(0,0,0,0.2);
      z-index: 9000;
      min-width: 200px;
      overflow: hidden;
    }
    .op-tag-dropdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      font-family: 'Open Sans', sans-serif;
      font-size: 14px;
      color: #212121;
      cursor: pointer;
      white-space: nowrap;
    }
    .op-tag-dropdown-item:hover { background: #f5f5f5; }
    .op-tag-dropdown-remove { color: #d32f2f; border-top: 1px solid #eee; }
    /* Single-select radio for the entry-level role picker. */
    .op-tag-dropdown-radio {
      width: 18px;
      height: 18px;
      border: 2px solid #9e9e9e;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
      background: #fff;
    }
    .op-tag-dropdown-radio.checked {
      border-color: #2ecc71;
    }
    .op-tag-dropdown-radio.checked::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: #2ecc71;
    }

    /* Time inputs */
    .op-time-row {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .op-time-field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .op-time-input {
      width: 100%;
      padding: 16px;
      font-family: 'Open Sans', sans-serif;
      font-size: 16px;
      line-height: 24px;
      color: #212121;
      background: #f5f5f5;
      border: none;
      border-bottom: 1px solid #707070;
      border-radius: 4px 4px 0 0;
      outline: none;
    }
    .op-time-input:focus { border-bottom-color: #2ecc71; }
    .op-helpers-input::-webkit-inner-spin-button,
    .op-helpers-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .op-helpers-input { -moz-appearance: textfield; }
    .op-time-label {
      font-family: 'Open Sans', sans-serif;
      font-size: 12px;
      line-height: 16px;
      color: #707070;
      padding: 0 16px;
      min-height: 20px;
      display: flex;
      align-items: flex-end;
    }

    /* Helpers number input */
    .op-helper-field {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .op-number-input {
      width: 100%;
      padding: 16px;
      font-family: 'Open Sans', sans-serif;
      font-size: 16px;
      line-height: 24px;
      color: #212121;
      background: #f5f5f5;
      border: none;
      border-bottom: 1px solid #707070;
      border-radius: 4px 4px 0 0;
      outline: none;
    }
    .op-number-input:focus { border-bottom-color: #2ecc71; }
    .op-number-input::placeholder { color: #212121; opacity: 0.38; }
    .op-helper-hint {
      font-family: 'Open Sans', sans-serif;
      font-size: 12px;
      line-height: 16px;
      color: #707070;
      padding: 0 16px;
      min-height: 20px;
      display: flex;
      align-items: flex-end;
    }

    /* ════════════════════════════════════
       RESPONSIVE BREAKPOINTS
       ════════════════════════════════════ */

    @media (max-width: 1545px) {
      .sv-station-block { flex: 3; }
      .sv-shift-block { flex: 4; }
      .sv-time-block { flex: unset; width: auto; padding: 4px 8px; }
      .sv-block-label { font-size: 16px; }
      .sv-quantity-box { min-width: 110px; }
      .sv-batch-box { min-width: 180px; }
      .sv-oee-panel { width: 120px; padding: 8px; }
      .sv-oee-pct { font-size: 18px; }
      .sv-qty-value { font-size: 28px; }
      .sv-bottombar { gap: 12px; }
      .sv-legend-item span { font-size: 11px; }
    }

    @media (max-width: 1145px) {
      .shift-view-section { flex: 1 1 0 !important; }
      .sv-station-block { flex: 3; }
      .sv-shift-block { flex: 4; }
      .sv-block-label { font-size: 15px; }
    }

    @media (max-width: 840px) {
      .sv-station-block { flex: 2; }
      .sv-shift-block { flex: 3; }
      .sv-block-label { font-size: 14px; }
      .sv-time-block { display: none; }
      .sv-oee-panel { display: none; }
      .sv-quantity-box { min-width: 100px; padding: 8px 12px; }
      .sv-batch-box { min-width: 160px; padding: 8px 12px; }
      .sv-qty-value { font-size: 24px; }
      .sv-bottombar { gap: 8px; padding: 0 8px; }
      .sv-legend-item span:not(.sv-counter) { display: none; }
      .sv-hour-col { width: 36px; font-size: 13px; }
      .sv-prod-col { width: 70px; font-size: 11px; }
    }

    @media (max-width: 600px) {
      .sv-topbar-block { height: 40px; }
      .sv-logo-btn { width: 40px; height: 40px; padding: 10px; }
      .sv-settings-block { display: none; }
      .sv-station-block { flex: 1; }
      .sv-shift-block { flex: 2; }
      .sv-block-label { font-size: 13px; }
      .sv-nav-btn { width: 32px; height: 32px; }
      .sv-info-panel { display: none; }
      .sv-bottombar { height: 32px; }
      .sv-hour-col { width: 28px; font-size: 11px; }
      .sv-prod-col { display: none; }
      .sv-timeline-row { height: 44px; }
    }

    @media (max-height: 600px) and (orientation: landscape) {
      .sv-topbar-block { height: 40px; }
      .sv-bottombar { height: 32px; }
      .sv-timeline-row { height: 44px; }
    }
  </style>
</head>
<body>
  <div class="sv-with-sidebar">
    <div id="chrome-sidebar"></div>
    <div id="app">
      <v-app>
        <div class="app-layout">
          <div class="shift-view-section">
            <shift-view
              :operator-summary="operatorSummary"
              @open-operators="operatorsPanelOpen = true"
            ></shift-view>
          </div>
        </div>

        <!-- Operators Panel (modal overlay) -->
        <operators-panel
          :visible="operatorsPanelOpen"
          @close="operatorsPanelOpen = false"
          @update:summary="operatorSummary = $event"
        ></operators-panel>
      </v-app>
    </div>
  </div>

  <script src="mock-data.js"></script>
  <script src="chrome.js"></script>
  <script>
    // Inject only the 1st-level dark sidebar (Shift View is its own dark surface — no top bar).
    (function () {
      const renderSidebar1 = (active) => {
        // We re-use Chrome's render logic by mounting into a temp host and extracting the .sb1.
        const tmp = document.createElement('div');
        tmp.id = '__tmp_chrome__';
        document.body.appendChild(tmp);
        Chrome.render({ sb1Active: active, sb2Active: null, title: '', mountSelector: '#__tmp_chrome__' });
        const sb1 = tmp.querySelector('.sb1');
        document.getElementById('chrome-sidebar').appendChild(sb1);
        tmp.remove();
      };
      renderSidebar1('shift-view');
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vuetify@3/dist/vuetify.min.js"></script>
  <script src="shift-view.js"></script>
  <script src="operators.js"></script>
  <script>
    const { createApp, ref } = Vue;
    const { createVuetify } = Vuetify;
    const vuetify = createVuetify();

    const app = createApp({
      components: { ShiftView, OperatorsPanel },
      setup() {
        const operatorsPanelOpen = ref(false);
        const operatorSummary = ref(null);
        return { operatorsPanelOpen, operatorSummary };
      }
    });

    app.use(vuetify);
    app.mount('#app');
  </script>
</body>
</html>
